# pi-dispatch profiles — named provider/model presets.
#
# Format: NAME PROVIDER MODEL   (whitespace-separated; # comments / blank lines ignored)
# Select with `pi-dispatch.sh --profile NAME …` or `PI_PROFILE=NAME`.
# Precedence: explicit PI_PROVIDER/PI_MODEL env > profile > built-in default.
#
# Edit/extend freely — this is the single place to register "which agent for which need".
# (Only provider+model today; tool/permission presets depend on pi-CLI support, TBD.)

