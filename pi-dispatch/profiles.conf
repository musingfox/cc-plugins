# pi-dispatch profiles — named provider/model presets for the omp agent binary.
#
# Format: NAME PROVIDER MODEL   (whitespace-separated; # comments / blank lines ignored)
# PROVIDER/MODEL are joined into a single omp --model spec (fuzzy-matched by omp).
# Select with `pi-dispatch.sh --profile NAME …` or `PI_PROFILE=NAME`.
# Precedence: explicit PI_PROVIDER/PI_MODEL env > profile > built-in default.
#
# Edit/extend freely — this is the single place to register "which model for which need".
# These must be providers with working auth in omp (`omp` → /login, or auth.json).

fast     xai-oauth     grok-build
balanced openai-codex  gpt-5.4
careful  openai-codex  gpt-5.5
