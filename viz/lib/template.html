<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOC_NAME_PLACEHOLDER</title>

    <!-- Code highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@latest/build/styles/atom-one-dark.min.css" id="hljs-theme">

    <!-- KaTeX math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.33/dist/katex.min.css">

    <!-- AOS scroll animations -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">

    <!-- Fonts: Noto Sans TC + Fira Code -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            max-width: 860px;
            margin: 48px auto;
            padding: 0 24px;
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.7;
            color: #2c2c2c;
            background: #fff;
            animation: pageLoad 0.5s ease-out;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @keyframes pageLoad {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* -- Typography -- */
        h1, h2, h3, h4, h5, h6 {
            margin-top: 1.6em;
            margin-bottom: 0.6em;
            font-weight: 700;
            letter-spacing: -0.01em;
            line-height: 1.35;
        }
        h1 { font-size: 1.85em; border-bottom: 1px solid #e0e0e0; padding-bottom: 0.35em; }
        h2 { font-size: 1.4em; border-bottom: 1px solid #eee; padding-bottom: 0.25em; }
        h3 { font-size: 1.15em; }

        p { margin: 0.75em 0; }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* -- Inline code -- */
        code {
            background: #f0f1f3;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.875em;
            font-variant-ligatures: none;
        }

        /* -- Code blocks -- */
        .code-block {
            margin: 1.25em 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 16px;
            background: #21252b;
            font-family: 'Fira Code', "SFMono-Regular", Consolas, monospace;
            font-size: 0.75em;
            color: #7f848e;
            letter-spacing: 0.02em;
            text-transform: lowercase;
            border-bottom: 1px solid #181a1f;
            user-select: none;
        }
        .code-header .copy-btn {
            background: none;
            border: 1px solid #3e4451;
            border-radius: 4px;
            color: #7f848e;
            font-size: 11px;
            padding: 2px 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .code-header .copy-btn:hover { color: #abb2bf; border-color: #5c6370; }

        pre {
            background: #282c34;
            padding: 16px;
            overflow-x: auto;
            margin: 0;
        }

        pre code {
            background: none;
            padding: 0;
            color: #abb2bf;
            font-size: 0.8125em;
            line-height: 1.6;
            border-radius: 0;
        }

        /* Standalone pre (no code-block wrapper yet) */
        #content > pre,
        #content > details > pre {
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin: 1.25em 0;
            padding: 16px;
        }

        /* -- Tables -- */
        .table-wrap {
            overflow-x: auto;
            margin: 1.25em 0;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        table { border-collapse: collapse; width: 100%; margin: 0; }
        th, td { padding: 10px 14px; text-align: left; font-size: 0.9em; }
        th {
            font-weight: 600;
            border-bottom: 2px solid #d0d0d0;
            background: #f8f9fa;
            position: sticky; top: 0; z-index: 1;
            white-space: nowrap;
        }
        td { border-bottom: 1px solid #eee; }
        td { font-variant-numeric: tabular-nums; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(37, 99, 235, 0.03); }

        /* -- Blockquote -- */
        blockquote {
            border-left: 3px solid #d0d0d0;
            margin: 1.25em 0;
            padding: 0.6em 1.2em;
            background: #f8f9fa;
            color: #4a4a4a;
            border-radius: 0 6px 6px 0;
        }
        blockquote p:first-child { margin-top: 0; }
        blockquote p:last-child { margin-bottom: 0; }

        /* -- Lists -- */
        ul, ol { padding-left: 1.5em; margin: 0.6em 0; }
        li { margin: 0.35em 0; }
        li > ul, li > ol { margin: 0.2em 0; }

        /* -- Other elements -- */
        hr { border: none; border-top: 1px solid #e0e0e0; margin: 2.5em 0; }
        img { max-width: 100%; height: auto; border-radius: 6px; }

        /* Checkbox styling */
        input[type="checkbox"] {
            margin-right: 6px;
            accent-color: #2563eb;
        }

        /* -- Mermaid diagrams -- */
        .mermaid-shell {
            position: relative;
            margin: 1.25em 0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }
        .zoom-controls {
            position: absolute; top: 8px; right: 8px;
            display: flex; gap: 4px; z-index: 10;
            opacity: 0; transition: opacity 0.2s;
        }
        .mermaid-shell:hover .zoom-controls { opacity: 1; }
        .zoom-controls button {
            width: 28px; height: 28px;
            border: 1px solid #d0d0d0; border-radius: 6px;
            background: rgba(255,255,255,0.92);
            cursor: pointer; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            color: #555; backdrop-filter: blur(8px);
            transition: all 0.15s;
        }
        .zoom-controls button:hover { background: #f0f0f0; border-color: #aaa; }
        .mermaid-viewport {
            overflow: hidden; cursor: grab;
            min-height: 100px; padding: 24px;
        }
        .mermaid-viewport:active { cursor: grabbing; }
        .mermaid-viewport .mermaid {
            text-align: center;
            transform-origin: 0 0;
            transition: transform 0.15s ease-out;
        }

        .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0.5em 0;
        }

        /* -- TOC navigation -- */
        body.has-toc { max-width: none; margin: 0; padding: 0; }
        .doc-layout {
            display: flex;
            max-width: 860px; margin: 48px auto; padding: 0 24px;
        }
        .toc {
            display: none; position: sticky; top: 40px;
            max-height: calc(100vh - 80px); overflow-y: auto;
            font-size: 0.82em; padding-right: 1.25em;
            border-right: 1px solid #eee;
        }
        .toc a {
            display: block; padding: 4px 10px;
            color: #888; text-decoration: none;
            border-left: 2px solid transparent;
            transition: all 0.15s; line-height: 1.4;
            border-radius: 0 3px 3px 0;
        }
        .toc a:hover { color: #444; background: #f8f9fa; }
        .toc a.active { color: #2563eb; border-left-color: #2563eb; font-weight: 500; }
        .toc a.toc-h3 { padding-left: 22px; font-size: 0.92em; }
        @media (min-width: 1200px) {
            .doc-layout { max-width: 1160px; gap: 3em; }
            .toc { display: block; width: 220px; min-width: 220px; }
            .doc-layout #content { min-width: 0; flex: 1; }
        }
        .toc-mobile {
            display: none; overflow-x: auto; padding: 8px 0;
            margin-bottom: 1em; border-bottom: 1px solid #eee;
            -webkit-overflow-scrolling: touch;
        }
        .toc-mobile a {
            white-space: nowrap; padding: 4px 12px;
            color: #888; text-decoration: none; font-size: 0.82em;
            border-bottom: 2px solid transparent;
        }
        .toc-mobile a.active { color: #2563eb; border-bottom-color: #2563eb; }
        @media (max-width: 1199px) {
            .toc-mobile.has-items { display: flex; }
        }

        /* -- Collapsible code blocks -- */
        details.code-collapse { margin: 1.25em 0; }
        details.code-collapse summary {
            cursor: pointer; padding: 8px 16px;
            background: #21252b; border-radius: 8px;
            color: #7f848e; font-family: 'Fira Code', monospace;
            font-size: 0.8em; list-style: none;
            display: flex; align-items: center; gap: 6px;
            border: 1px solid #e0e0e0;
        }
        details.code-collapse summary::-webkit-details-marker { display: none; }
        details.code-collapse summary::before { content: '\25b6'; font-size: 0.7em; transition: transform 0.2s; }
        details.code-collapse[open] summary::before { transform: rotate(90deg); }
        details.code-collapse[open] summary { border-radius: 8px 8px 0 0; border-bottom: none; }
        details.code-collapse pre { margin-top: 0 !important; border-radius: 0 0 8px 8px !important; }
        details.code-collapse .code-block { margin-top: 0; border-radius: 0 0 8px 8px; }
        details.code-collapse .code-block .code-header { display: none; }

        /* -- Mobile responsive -- */
        @media (max-width: 600px) {
            body { margin: 24px auto; padding: 0 16px; font-size: 15px; }
            body.has-toc { padding: 0; }
            .doc-layout { margin: 24px auto; padding: 0 16px; }
            h1 { font-size: 1.5em; }
            h2 { font-size: 1.2em; }
            h3 { font-size: 1.05em; }
            pre { padding: 12px; }
            pre code { font-size: 0.8em; }
            .code-header { padding: 5px 12px; font-size: 0.7em; }
            th, td { padding: 8px 10px; font-size: 0.85em; }
            .mermaid-viewport { padding: 12px; }
            .zoom-controls { opacity: 1; }
            .zoom-controls button { width: 32px; height: 32px; font-size: 15px; }
            details.code-collapse summary { padding: 8px 12px; }
            blockquote { padding: 0.5em 1em; }
        }

        /* -- Dark mode -- */
        @media (prefers-color-scheme: dark) {
            body { background: #1b1b1f; color: #d4d4d8; }
            a { color: #60a5fa; }
            h1 { border-bottom-color: #2e2e33; }
            h2 { border-bottom-color: #2e2e33; }
            code { background: #27272a; color: #d4d4d8; }
            pre { background: #282c34; }
            .code-block { border-color: #2e2e33; }
            .code-header { background: #21252b; border-bottom-color: #181a1f; }
            .code-header .copy-btn { border-color: #3e4451; }
            #content > pre, #content > details > pre { border-color: #2e2e33; }
            .table-wrap { border-color: #2e2e33; }
            th { background: #27272a; border-bottom-color: #3e3e44; }
            td { border-bottom-color: #2e2e33; }
            tr:hover td { background: rgba(96, 165, 250, 0.05); }
            blockquote { border-left-color: #3e3e44; background: #222226; color: #a1a1aa; }
            hr { border-top-color: #2e2e33; }
            .mermaid-shell { background: #27272a; border-color: #2e2e33; }
            .zoom-controls button { background: rgba(39,39,42,0.92); border-color: #3e3e44; color: #a1a1aa; }
            .zoom-controls button:hover { background: #3e3e44; }
            .toc { border-right-color: #2e2e33; }
            .toc a { color: #71717a; }
            .toc a:hover { color: #d4d4d8; background: #27272a; }
            .toc a.active { color: #60a5fa; border-left-color: #60a5fa; }
            .toc-mobile { border-bottom-color: #2e2e33; }
            .toc-mobile a { color: #71717a; }
            .toc-mobile a.active { color: #60a5fa; border-bottom-color: #60a5fa; }
            details.code-collapse summary { border-color: #2e2e33; }
            input[type="checkbox"] { accent-color: #60a5fa; }
        }
    </style>
</head>
<body>
    <div id="content"></div>

    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- DOMPurify: sanitizes ALL rendered HTML before DOM insertion to prevent XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

    <!-- Diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

    <!-- Code highlighting -->
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@latest/build/highlight.min.js"></script>

    <!-- KaTeX math -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.33/dist/katex.min.js"></script>

    <!-- AOS scroll animations -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <script>
        function base64DecodeUTF8(base64) {
            var binaryString = atob(base64);
            var bytes = new Uint8Array(binaryString.length);
            for (var i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return new TextDecoder('utf-8').decode(bytes);
        }

        window.addEventListener('load', function() {
            try {
                // 1. Decode base64 content
                var docBase64 = "DOC_BASE64_PLACEHOLDER";
                var docMarkdown = base64DecodeUTF8(docBase64);

                // 2. Configure marked with highlight.js for syntax highlighting
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (lang && hljs.getLanguage(lang)) {
                            return hljs.highlight(code, { language: lang }).value;
                        }
                        return hljs.highlightAuto(code).value;
                    },
                    gfm: true,
                    breaks: false
                });

                // 3. Render markdown to HTML, sanitize with DOMPurify to prevent XSS,
                //    then insert the sanitized result into the DOM
                var html = marked.parse(docMarkdown);
                var cleanHtml = DOMPurify.sanitize(html, {
                    ADD_TAGS: ['pre', 'span'],
                    ADD_ATTR: ['class', 'language', 'style']
                });
                document.getElementById('content').innerHTML = cleanHtml;

                // 4. KaTeX: render math expressions after DOM insertion
                // Block math: $$...$$
                document.querySelectorAll('p, li, td, th, blockquote').forEach(function(el) {
                    if (el.textContent.indexOf('$$') === -1) return;
                    el.innerHTML = el.innerHTML.replace(/\$\$([\s\S]*?)\$\$/g, function(match, tex) {
                        try {
                            return katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false });
                        } catch (e) { return match; }
                    });
                });
                // Inline math: $...$ (but not $$)
                document.querySelectorAll('p, li, td, th, blockquote').forEach(function(el) {
                    if (el.textContent.indexOf('$') === -1) return;
                    el.innerHTML = el.innerHTML.replace(/(?<!\$)\$(?!\$)((?:[^$\\]|\\.)+?)\$(?!\$)/g, function(match, tex) {
                        try {
                            return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false });
                        } catch (e) { return match; }
                    });
                });

                // 5. Wrap code blocks with language header and copy button
                document.querySelectorAll('#content pre').forEach(function(pre) {
                    if (pre.closest('.mermaid-shell')) return;
                    if (pre.parentElement.classList.contains('code-block')) return;
                    var code = pre.querySelector('code');
                    var lang = '';
                    if (code) {
                        var m = code.className.match(/language-(\w+)/);
                        if (m) lang = m[1];
                    }
                    if (lang && lang !== 'mermaid') {
                        var wrapper = document.createElement('div');
                        wrapper.className = 'code-block';
                        var header = document.createElement('div');
                        header.className = 'code-header';
                        var langSpan = document.createElement('span');
                        langSpan.textContent = lang;
                        header.appendChild(langSpan);
                        var copyBtn = document.createElement('button');
                        copyBtn.className = 'copy-btn';
                        copyBtn.textContent = 'copy';
                        copyBtn.addEventListener('click', function() {
                            var text = code ? code.textContent : pre.textContent;
                            navigator.clipboard.writeText(text).then(function() {
                                copyBtn.textContent = 'copied!';
                                setTimeout(function() { copyBtn.textContent = 'copy'; }, 1500);
                            });
                        });
                        header.appendChild(copyBtn);
                        wrapper.appendChild(header);
                        pre.parentNode.insertBefore(wrapper, pre);
                        wrapper.appendChild(pre);
                    }
                });

                // 6. Helper: create zoom control buttons
                function createZoomControls() {
                    var controls = document.createElement('div');
                    controls.className = 'zoom-controls';
                    var actions = [
                        { action: 'zoom-in', title: 'Zoom in', label: '+' },
                        { action: 'zoom-out', title: 'Zoom out', label: '\u2212' },
                        { action: 'zoom-reset', title: 'Reset', label: '1:1' },
                        { action: 'expand', title: 'Open in new tab', label: '\u26F6' }
                    ];
                    actions.forEach(function(item) {
                        var btn = document.createElement('button');
                        btn.dataset.action = item.action;
                        btn.title = item.title;
                        btn.textContent = item.label;
                        controls.appendChild(btn);
                    });
                    return controls;
                }

                // 7. Convert mermaid code blocks to shells with zoom/pan
                document.querySelectorAll('code.language-mermaid').forEach(function(codeBlock) {
                    var pre = codeBlock.parentElement;
                    var wrapper = pre.closest('.code-block');
                    var shell = document.createElement('div');
                    shell.className = 'mermaid-shell';
                    shell.appendChild(createZoomControls());
                    var viewport = document.createElement('div');
                    viewport.className = 'mermaid-viewport';
                    var mermaidDiv = document.createElement('div');
                    mermaidDiv.className = 'mermaid';
                    mermaidDiv.textContent = codeBlock.textContent;
                    viewport.appendChild(mermaidDiv);
                    shell.appendChild(viewport);
                    if (wrapper) {
                        wrapper.replaceWith(shell);
                    } else {
                        pre.replaceWith(shell);
                    }
                });

                // 8. Wrap tables in scrollable containers
                document.querySelectorAll('#content table').forEach(function(table) {
                    if (table.parentElement.classList.contains('table-wrap')) return;
                    var wrap = document.createElement('div');
                    wrap.className = 'table-wrap';
                    table.parentNode.insertBefore(wrap, table);
                    wrap.appendChild(table);
                });

                // 9. Collapse long code blocks (30+ lines)
                document.querySelectorAll('#content pre').forEach(function(pre) {
                    if (pre.closest('.mermaid-shell')) return;
                    var lines = pre.textContent.split('\n').length;
                    if (lines < 30) return;
                    var codeBlockWrapper = pre.closest('.code-block');
                    var target = codeBlockWrapper || pre;
                    var details = document.createElement('details');
                    details.className = 'code-collapse';
                    var summary = document.createElement('summary');
                    var lang = '';
                    var code = pre.querySelector('code');
                    if (code) {
                        var m = code.className.match(/language-(\w+)/);
                        if (m) lang = m[1];
                    }
                    summary.textContent = lang ? lang + ' \u2014 ' + lines + ' lines' : lines + ' lines';
                    details.appendChild(summary);
                    target.parentNode.insertBefore(details, target);
                    details.appendChild(target);
                });

                // 10. Generate TOC from headings (4+ sections)
                var headings = document.querySelectorAll('#content h2, #content h3');
                if (headings.length >= 4) {
                    var toc = document.createElement('nav');
                    toc.className = 'toc';
                    var tocMobile = document.createElement('nav');
                    tocMobile.className = 'toc-mobile has-items';
                    headings.forEach(function(h, i) {
                        if (!h.id) h.id = 'heading-' + i;
                        var a = document.createElement('a');
                        a.href = '#' + h.id;
                        a.textContent = h.textContent;
                        if (h.tagName === 'H3') a.className = 'toc-h3';
                        toc.appendChild(a);
                        if (h.tagName === 'H2') tocMobile.appendChild(a.cloneNode(true));
                    });
                    var content = document.getElementById('content');
                    var layout = document.createElement('div');
                    layout.className = 'doc-layout';
                    content.parentNode.insertBefore(layout, content);
                    layout.appendChild(toc);
                    layout.appendChild(content);
                    content.insertBefore(tocMobile, content.firstChild);
                    document.body.classList.add('has-toc');
                    var tocLinks = toc.querySelectorAll('a');
                    var mobileLinks = tocMobile.querySelectorAll('a');
                    var observer = new IntersectionObserver(function(entries) {
                        entries.forEach(function(entry) {
                            if (entry.isIntersecting) {
                                tocLinks.forEach(function(l) { l.classList.remove('active'); });
                                mobileLinks.forEach(function(l) { l.classList.remove('active'); });
                                var id = entry.target.id;
                                var hit = toc.querySelector('a[href="#' + id + '"]');
                                if (hit) hit.classList.add('active');
                                var hitM = tocMobile.querySelector('a[href="#' + id + '"]');
                                if (hitM) hitM.classList.add('active');
                            }
                        });
                    }, { rootMargin: '-10% 0px -80% 0px' });
                    headings.forEach(function(h) { observer.observe(h); });
                }

                // 11. Add AOS scroll animations
                document.querySelectorAll('h1, h2, h3, .table-wrap, blockquote, .mermaid-shell, .katex-display, details.code-collapse').forEach(function(el) {
                    el.setAttribute('data-aos', 'fade-up');
                });
                document.querySelectorAll('#content pre, #content .code-block').forEach(function(el) {
                    if (!el.closest('.mermaid-shell') && !el.closest('details')) {
                        el.setAttribute('data-aos', 'fade-up');
                    }
                });

                // 12. Initialize Mermaid (visibility-aware lazy rendering)
                mermaid.initialize({
                    startOnLoad: false,
                    theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default',
                    securityLevel: 'strict'
                });
                var mermaidNodes = document.querySelectorAll('.mermaid');
                function renderMermaid() {
                    if (mermaidNodes.length === 0) return;
                    requestAnimationFrame(function() { mermaid.run({ nodes: mermaidNodes }); });
                }
                if (document.visibilityState === 'visible') {
                    renderMermaid();
                } else {
                    document.addEventListener('visibilitychange', function onVisible() {
                        if (document.visibilityState === 'visible') {
                            document.removeEventListener('visibilitychange', onVisible);
                            renderMermaid();
                        }
                    });
                }

                // 13. Mermaid zoom/pan controls
                function openDiagramTab(svgEl) {
                    var page = document.implementation.createHTMLDocument('Diagram');
                    page.body.setAttribute('style', 'margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#fff');
                    var style = page.createElement('style');
                    style.textContent = '@media(prefers-color-scheme:dark){body{background:#1b1b1f}}svg{max-width:95vw;max-height:95vh}';
                    page.head.appendChild(style);
                    page.body.appendChild(page.importNode(svgEl, true));
                    var blob = new Blob([page.documentElement.outerHTML], { type: 'text/html' });
                    window.open(URL.createObjectURL(blob), '_blank');
                }
                document.querySelectorAll('.mermaid-shell').forEach(function(shell) {
                    var viewport = shell.querySelector('.mermaid-viewport');
                    var canvas = viewport.querySelector('.mermaid') || viewport.querySelector('.mermaid-rendered');
                    if (!canvas) return;
                    var scale = 1, panX = 0, panY = 0, startX, startY;
                    function apply() {
                        canvas.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + scale + ')';
                    }
                    shell.querySelectorAll('.zoom-controls button').forEach(function(btn) {
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            var act = btn.dataset.action;
                            if (act === 'zoom-in') scale = Math.min(scale * 1.3, 5);
                            else if (act === 'zoom-out') scale = Math.max(scale / 1.3, 0.2);
                            else if (act === 'zoom-reset') { scale = 1; panX = 0; panY = 0; }
                            else if (act === 'expand') {
                                var svg = canvas.querySelector('svg');
                                if (svg) openDiagramTab(svg);
                            }
                            apply();
                        });
                    });
                    viewport.addEventListener('wheel', function(e) {
                        if (e.ctrlKey || e.metaKey) {
                            e.preventDefault();
                            scale = Math.max(0.2, Math.min(5, scale * (e.deltaY > 0 ? 0.9 : 1.1)));
                            apply();
                        }
                    }, { passive: false });
                    viewport.addEventListener('mousedown', function(e) {
                        if (e.button !== 0) return;
                        startX = e.clientX - panX;
                        startY = e.clientY - panY;
                        function onMove(ev) {
                            panX = ev.clientX - startX;
                            panY = ev.clientY - startY;
                            canvas.style.transition = 'none';
                            apply();
                        }
                        function onUp() {
                            canvas.style.transition = '';
                            document.removeEventListener('mousemove', onMove);
                            document.removeEventListener('mouseup', onUp);
                        }
                        document.addEventListener('mousemove', onMove);
                        document.addEventListener('mouseup', onUp);
                    });
                    // Touch: single finger pan
                    viewport.addEventListener('touchstart', function(e) {
                        if (e.touches.length === 1) {
                            startX = e.touches[0].clientX - panX;
                            startY = e.touches[0].clientY - panY;
                        }
                    }, { passive: true });
                    viewport.addEventListener('touchmove', function(e) {
                        if (e.touches.length === 1) {
                            e.preventDefault();
                            panX = e.touches[0].clientX - startX;
                            panY = e.touches[0].clientY - startY;
                            canvas.style.transition = 'none';
                            apply();
                        } else if (e.touches.length === 2) {
                            e.preventDefault();
                            var dx = e.touches[0].clientX - e.touches[1].clientX;
                            var dy = e.touches[0].clientY - e.touches[1].clientY;
                            var dist = Math.sqrt(dx * dx + dy * dy);
                            if (viewport._lastPinchDist) {
                                var delta = dist / viewport._lastPinchDist;
                                scale = Math.max(0.2, Math.min(5, scale * delta));
                                apply();
                            }
                            viewport._lastPinchDist = dist;
                        }
                    }, { passive: false });
                    viewport.addEventListener('touchend', function() {
                        canvas.style.transition = '';
                        viewport._lastPinchDist = null;
                    }, { passive: true });
                });

                // 14. Initialize AOS scroll animations
                AOS.init({ duration: 500, once: true, offset: 40 });

            } catch (error) {
                document.getElementById('content').textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
